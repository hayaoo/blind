name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build BlindCore
        run: |
          cd Packages/BlindCore
          swift build

      - name: Test BlindCore
        run: |
          cd Packages/BlindCore
          swift test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            Packages/BlindCore/.build/
            *.log

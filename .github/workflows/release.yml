name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build BlindCore
        run: |
          cd Packages/BlindCore
          swift build -c release

      - name: Test BlindCore
        run: |
          cd Packages/BlindCore
          swift test

